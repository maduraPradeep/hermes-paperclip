# Runs Hermes Agent + Paperclip + Hermes Workspace side-by-side.
#
# LOCAL TESTING (no DNS or TLS needed):
#   docker compose run --rm hermes setup          # Hermes API keys wizard
#   docker compose run --rm paperclip onboard --yes
#   docker compose up -d
#   # Services available at:
#   #   http://localhost:8642  — Hermes gateway (OpenAI-compatible API)
#   #   http://localhost:9119  — Hermes dashboard
#   #   http://localhost:3000  — Hermes Workspace
#   #   http://localhost:3100  — Paperclip
#
# PRODUCTION (with TLS via nginx + Let's Encrypt):
#   See docker-compose.nginx.yml

services:
  hermes:
    image: hermes-paperclip:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes
    restart: unless-stopped
    # Inherit Hermes' default ENTRYPOINT (/opt/hermes/docker/entrypoint.sh).
    # `gateway run` exposes the OpenAI-compatible API + health endpoint on 8642.
    command: ["gateway", "run"]
    environment:
      HERMES_HOME: /opt/data
      # Map the in-container `hermes` user to the host user so files written
      # to ./data/hermes are owned by you, not UID 10000. Override if needed.
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      # Enable the OpenAI-compatible API server platform and bind it on all
      # interfaces so nginx and hermes-workspace (on the compose network)
      # can reach it. Without API_SERVER_ENABLED the gateway starts but
      # never opens port 8642; without HOST=0.0.0.0 it only listens on
      # 127.0.0.1 inside the container and is unreachable from other services.
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      # Required to bind on 0.0.0.0 — reuses HERMES_API_TOKEN so the same
      # value works in both hermes (API_SERVER_KEY) and hermes-workspace.
      API_SERVER_KEY: ${HERMES_API_TOKEN:?set HERMES_API_TOKEN in .env}
      GATEWAY_ALLOW_ALL_USERS: "true"
    volumes:
      - ./data/hermes:/opt/data
    ports:
      - "8642:8642"   # gateway / OpenAI-compatible API
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-dashboard:
    image: hermes-paperclip:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    # `--insecure` is required for any non-loopback bind — Hermes warns it
    # "exposes API keys on the network". In production this is safe because
    # docker-compose.nginx.yml is the sole upstream; locally you are on your
    # own machine so it is equally safe.
    # FOR PRODUCTION: add HTTP basic auth at the nginx layer (auth_basic
    # in nginx/conf.d/hermes.conf.template) so the dashboard isn't open to
    # anyone who can resolve the public domain.
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      GATEWAY_HEALTH_URL: http://hermes:8642
    volumes:
      - ./data/hermes:/opt/data
    ports:
      - "9119:9119"   # Hermes dashboard
    depends_on:
      hermes:
        condition: service_started

  paperclip:
    image: hermes-paperclip:latest
    container_name: paperclip
    restart: unless-stopped
    # paperclip-entrypoint.sh starts as root just long enough to:
    #   - fix /data ownership (Docker creates bind mounts as root, but
    #     Paperclip's embedded Postgres refuses root)
    #   - register PAPERCLIP_UID/GID in /etc/passwd|/etc/group (libuv crashes
    #     with uv_os_get_passwd ENOENT otherwise)
    #   - patch config.json to force server.bind=lan / host=0.0.0.0 /
    #     deploymentMode=authenticated and merge PAPERCLIP_ALLOWED_HOSTS
    #     into server.allowedHostnames — so the running container is always
    #     reachable from the nginx upstream regardless of how `onboard` was run
    # then drops to PAPERCLIP_UID/GID via setpriv and execs `paperclipai "$@"`.
    #
    # `--bind lan` only matters on FIRST run (no config yet); on subsequent
    # runs the in-place patcher above keeps the config correct. Override the
    # command per-invocation for one-offs:
    #   docker compose run --rm paperclip onboard --yes
    #   docker compose run --rm paperclip allowed-hostname some.other.host
    entrypoint: ["/usr/local/bin/paperclip-entrypoint.sh"]
    command: ["run", "--bind", "lan"]
    environment:
      PAPERCLIP_UID: ${PAPERCLIP_UID:-1000}
      PAPERCLIP_GID: ${PAPERCLIP_GID:-1000}
      # Comma-separated list of hostnames merged into server.allowedHostnames.
      # `paperclip` (compose service name) and `localhost` are always added.
      # Defaults to PAPERCLIP_DOMAIN so the public domain works automatically.
      PAPERCLIP_ALLOWED_HOSTS: ${PAPERCLIP_ALLOWED_HOSTS:-${PAPERCLIP_DOMAIN:-}}
      # Service-level so `docker compose exec paperclip ...` (which bypasses
      # the entrypoint) finds the right config dir. paperclipai resolves
      # config to $PAPERCLIP_HOME/instances/$INSTANCE/config.json (else $HOME).
      HOME: /data
      PAPERCLIP_HOME: /data
      HOST: "0.0.0.0"
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
      # Share Hermes' configured home with the `hermes` service so paperclipai's
      # `hermes` invocations see the API keys / config from `hermes setup`.
      # ASSUMES `HERMES_UID == PAPERCLIP_UID` (both default to 1000 in
      # .env.example) so file ownership lines up; if you change one, change
      # the other too.
      HERMES_HOME: /opt/data
      # Add Hermes' venv to PATH so `hermes` resolves for paperclipai's
      # version check and for `docker compose exec paperclip hermes ...`.
      PATH: /opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./paperclip-entrypoint.sh:/usr/local/bin/paperclip-entrypoint.sh:ro
      - ./data/paperclip:/data
      # Same bind mount as the `hermes` service — so `hermes setup` config
      # written by either container is visible to both.
      - ./data/hermes:/opt/data
    ports:
      - "3100:3100"   # Paperclip

  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes-workspace
    restart: unless-stopped
    user: "${HERMES_UID:-1000}:${HERMES_GID:-1000}"
    environment:
      # Point the workspace UI at the Hermes gateway on the compose network.
      HERMES_API_URL: http://hermes:8642
      # Must match API_SERVER_KEY on the hermes service if you set one; leave
      # blank if the gateway runs without auth (the default in this stack).
      HERMES_API_TOKEN: ${HERMES_API_TOKEN:-}
      # Optional locally; required in production (set in docker-compose.nginx.yml).
      HERMES_PASSWORD: ${HERMES_PASSWORD:-}
      # Point to the dashboard service for integrated links.
      HERMES_DASHBOARD_URL: http://hermes-dashboard:9119
      # Disabled for local HTTP; docker-compose.nginx.yml overrides both to
      # "true" when the workspace is behind nginx TLS.
      COOKIE_SECURE: "false"
      TRUST_PROXY: "false"
      # Bypass the non-loopback+no-password guard for local development.
      # docker-compose.nginx.yml removes this by requiring HERMES_PASSWORD instead.
      HERMES_ALLOW_INSECURE_REMOTE: "1"
    volumes:
      - ./data/workspace:/home/workspace
    ports:
      - "3000:3000"   # Hermes Workspace UI
    depends_on:
      hermes:
        condition: service_healthy
