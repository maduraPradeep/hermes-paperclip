# Runs Hermes Agent + Paperclip side-by-side from the same combined image.
#
# Both services share the same image (hermes-paperclip:latest) but use
# different entrypoints/commands and isolated data volumes.
#
# First-time setup:
#   docker compose run --rm hermes setup        # Hermes API keys wizard
#   docker compose run --rm paperclip onboard --yes   # Paperclip first-run
#
# Then:
#   docker compose up -d
#
# Logs:
#   docker compose logs -f hermes
#   docker compose logs -f paperclip

services:
  hermes:
    image: hermes-paperclip:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes
    restart: unless-stopped
    # Inherit Hermes' default ENTRYPOINT (/opt/hermes/docker/entrypoint.sh).
    # `gateway run` exposes the OpenAI-compatible API + health endpoint on 8642.
    command: ["gateway", "run"]
    environment:
      HERMES_HOME: /opt/data
      # Map the in-container `hermes` user to the host user so files written
      # to ./data/hermes are owned by you, not UID 10000. Override if needed.
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      # Force the gateway to bind on all interfaces — without this it
      # listens on 127.0.0.1 only, so neither nginx nor hermes-dashboard
      # (both on the compose network) can reach it.
      HERMES_GATEWAY_HOST: "0.0.0.0"
      HERMES_GATEWAY_PORT: "8642"
    volumes:
      - ./data/hermes:/opt/data
    ports:
      - "8642:8642"   # gateway / OpenAI-compatible API
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-dashboard:
    image: hermes-paperclip:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["dashboard"]
    environment:
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      # Dashboard talks to the gateway over the compose network.
      GATEWAY_HEALTH_URL: http://hermes:8642
      # Force the dashboard to bind on all interfaces — by default it only
      # listens on 127.0.0.1 inside the container, which means nginx (on the
      # compose network) gets "connection refused".
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
    volumes:
      - ./data/hermes:/opt/data
    # No host port — exposed only inside the compose network and proxied by nginx.
    expose:
      - "9119"
    depends_on:
      hermes:
        condition: service_started

  paperclip:
    image: hermes-paperclip:latest
    container_name: paperclip
    restart: unless-stopped
    # paperclip-entrypoint.sh starts as root just long enough to:
    #   - fix /data ownership (Docker creates bind mounts as root, but
    #     Paperclip's embedded Postgres refuses root)
    #   - register PAPERCLIP_UID/GID in /etc/passwd|/etc/group (libuv crashes
    #     with uv_os_get_passwd ENOENT otherwise)
    #   - patch config.json to force server.bind=lan / host=0.0.0.0 /
    #     deploymentMode=authenticated and merge PAPERCLIP_ALLOWED_HOSTS
    #     into server.allowedHostnames — so the running container is always
    #     reachable from the nginx upstream regardless of how `onboard` was run
    # then drops to PAPERCLIP_UID/GID via setpriv and execs `paperclipai "$@"`.
    #
    # `--bind lan` only matters on FIRST run (no config yet); on subsequent
    # runs the in-place patcher above keeps the config correct. Override the
    # command per-invocation for one-offs:
    #   docker compose run --rm paperclip onboard --yes
    #   docker compose run --rm paperclip allowed-hostname some.other.host
    entrypoint: ["/usr/local/bin/paperclip-entrypoint.sh"]
    command: ["run", "--bind", "lan"]
    environment:
      PAPERCLIP_UID: ${PAPERCLIP_UID:-1000}
      PAPERCLIP_GID: ${PAPERCLIP_GID:-1000}
      # Comma-separated list of hostnames merged into server.allowedHostnames.
      # `paperclip` (compose service name) and `localhost` are always added.
      # Defaults to PAPERCLIP_DOMAIN so the public domain works automatically.
      PAPERCLIP_ALLOWED_HOSTS: ${PAPERCLIP_ALLOWED_HOSTS:-${PAPERCLIP_DOMAIN:-}}
      # Service-level so `docker compose exec paperclip ...` (which bypasses
      # the entrypoint) finds the right config dir. paperclipai resolves
      # config to $PAPERCLIP_HOME/instances/$INSTANCE/config.json (else $HOME).
      HOME: /data
      PAPERCLIP_HOME: /data
      HOST: "0.0.0.0"
      PAPERCLIP_TELEMETRY_DISABLED: "1"
      DO_NOT_TRACK: "1"
      # Share Hermes' configured home with the `hermes` service so paperclipai's
      # `hermes` invocations see the API keys / config from `hermes setup`.
      # ASSUMES `HERMES_UID == PAPERCLIP_UID` (both default to 1000 in
      # .env.example) so file ownership lines up; if you change one, change
      # the other too.
      HERMES_HOME: /opt/data
      # Add Hermes' venv to PATH so `hermes` resolves for paperclipai's
      # version check and for `docker compose exec paperclip hermes ...`.
      PATH: /opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - ./paperclip-entrypoint.sh:/usr/local/bin/paperclip-entrypoint.sh:ro
      - ./data/paperclip:/data
      # Same bind mount as the `hermes` service — so `hermes setup` config
      # written by either container is visible to both.
      - ./data/hermes:/opt/data
    expose:
      - "3100"

  # ---------------------------------------------------------------------------
  # nginx + certbot — public TLS termination for the Hermes dashboard and
  # Paperclip. Both apps stay private inside the compose network; only nginx
  # binds to the host's :80 and :443.
  #
  # First-time bootstrap (after DNS for both domains points at this host):
  #   cp .env.example .env  &&  $EDITOR .env   # set HERMES_DOMAIN, PAPERCLIP_DOMAIN, LE_EMAIL
  #   docker compose up -d                     # nginx starts in HTTP-only bootstrap mode
  #   ./init-letsencrypt.sh                    # provisions certs + restarts nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    environment:
      HERMES_DOMAIN: ${HERMES_DOMAIN:?set HERMES_DOMAIN in .env}
      PAPERCLIP_DOMAIN: ${PAPERCLIP_DOMAIN:?set PAPERCLIP_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:rw
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.d/40-render-templates.sh:ro
      - ./data/letsencrypt:/etc/letsencrypt:ro
      - ./data/certbot-www:/var/www/certbot:ro
    # Use the bundled entrypoint to render templates and bootstrap-or-serve.
    entrypoint: ["/docker-entrypoint.d/40-render-templates.sh"]
    depends_on:
      - hermes-dashboard
      - paperclip

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    # Renews any existing certs every 12h. Initial issuance is done via
    # ./init-letsencrypt.sh (one-shot `docker compose run --rm certbot`).
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h & wait $${!}
        done
    volumes:
      - ./data/letsencrypt:/etc/letsencrypt:rw
      - ./data/certbot-www:/var/www/certbot:rw
    depends_on:
      - nginx
